name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.14.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm e2e
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: interlis-web-ide-${{ github.sha }}
          path: |
            dist
            playwright-report
            test-results
          if-no-files-found: error
          retention-days: 14
